- host: Host_A
  user: almalinux
  key_filename: ~/.ssh/id_rsa
  buffer_lines: 20
  root_access_type: sudo
  log_files:
    - /var/log/nginx/access.log
    - /var/log/nginx/error.log
  filters:
    - "ERROR"
    - "CRITICAL"
    - "404"
  output_format: json

- host: Host_B
  user: pablo
  key_filename: ~/.ssh/id_ed25519
  buffer_lines: 10
  root_access_type: doas
  log_file: /var/log/syslog
  filters:
    - "sshd"
    - "failed|error"
  output_format: iso8601

- host: localhost
  is_localhost: true
  buffer_lines: 5
  log_files:
    - /var/log/system.log
    - /var/log/install.log
  filters:
    - "kernel"
    - "panic|error"
  output_format: compact
